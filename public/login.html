<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #d9e0e8;
        --surface: rgba(255, 253, 248, 0.92);
        --ink: #1f1d1a;
        --muted: #324769;
        --accent: #18253a;
        --line: rgba(31, 29, 26, 0.08);
        --shadow: 0 20px 40px rgba(59, 45, 29, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        display: grid;
        place-items: center;
        color: var(--ink);
        font-family: "Space Grotesk", sans-serif;
        background:
          radial-gradient(circle at top, rgba(217, 108, 61, 0.18), transparent 32%),
          linear-gradient(180deg, #dce4ec 0%, #d2dbe5 100%);
      }

      .panel {
        width: min(420px, 100%);
        padding: 32px 28px;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: var(--surface);
        box-shadow: var(--shadow);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 5vw, 2.8rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .loader {
        display: inline-flex;
        gap: 10px;
        margin: 24px 0 18px;
        align-items: flex-end;
        height: 42px;
      }

      .loader span {
        width: 12px;
        height: 16px;
        border-radius: 999px;
        background: linear-gradient(180deg, #6d5b93 0%, var(--accent) 100%);
        animation: rise 0.8s ease-in-out infinite;
        transform-origin: bottom;
      }

      .loader span:nth-child(2) {
        animation-delay: 0.12s;
      }

      .loader span:nth-child(3) {
        animation-delay: 0.24s;
      }

      @keyframes rise {
        0%,
        100% {
          transform: scaleY(0.45);
          opacity: 0.45;
        }

        50% {
          transform: scaleY(1.2);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Redirecting</h1>
      <div class="loader" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <p id="status">Checking your saved login...</p>
    </main>

    <script>
      (() => {
        const status = document.getElementById('status');
        const accessToken = localStorage.getItem('accessToken');
        const isLoggedIn = localStorage.getItem('isLoggedIn');

        function isTokenExpired(token) {
          if (!token) {
            return true;
          }

          try {
            const payload = JSON.parse(
              atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')),
            );
            return !payload.exp || payload.exp * 1000 <= Date.now();
          } catch {
            return true;
          }
        }

        if (isLoggedIn === 'true' && accessToken && !isTokenExpired(accessToken)) {
          status.textContent = 'Session found. Opening your live map...';
          window.location.replace('/home');
          return;
        }

        localStorage.removeItem('accessToken');
        localStorage.removeItem('user');
        localStorage.removeItem('isLoggedIn');
        status.textContent = 'No saved login found. Redirecting to your auth service...';
        window.location.replace('/login');
      })();
    </script>
  </body>
</html>
